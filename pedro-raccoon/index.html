<!DOCTYPE html>
<html>
<head>
    <title>Pedro Raccoon - VS Games</title>
    <style>
        body { background: #0d1117; color: #58a6ff; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { background: #161b22; border: 3px solid #58a6ff; box-shadow: 0 0 20px rgba(88,166,255,0.3); margin-top: 20px; cursor: pointer; }
        .ui { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>PEDRO RACCOON: DASH</h1>
    <canvas id="game" width="400" height="500"></canvas>
    <div class="ui">Clique ou use Espaço para pular!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0, raccoonY = 250, velocity = 0, gravity = 0.4;
        let pipeX = 400, pipeGap = 150, pipeTopHeight = 150;

        function draw() {
            ctx.clearRect(0,0,400,500);

            // Raccoon (Representado por um círculo azul neon)
            ctx.fillStyle = '#58a6ff';
            ctx.beginPath(); ctx.arc(50, raccoonY, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillText("🦝", 42, raccoonY+5); // Emoji centralizado

            // Gravidade
            velocity += gravity;
            raccoonY += velocity;

            // Obstáculos
            ctx.fillStyle = '#238636';
            ctx.fillRect(pipeX, 0, 50, pipeTopHeight);
            ctx.fillRect(pipeX, pipeTopHeight + pipeGap, 50, 500);
            pipeX -= 3;

            if(pipeX < -50) { pipeX = 400; pipeTopHeight = Math.random() * 250 + 50; score++; }

            // Colisão e Game Over
            if(raccoonY > 500 || raccoonY < 0 || (pipeX < 65 && pipeX > 35 && (raccoonY < pipeTopHeight || raccoonY > pipeTopHeight + pipeGap))) {
                raccoonY = 250; velocity = 0; pipeX = 400; score = 0;
            }

            ctx.fillStyle = "white"; ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);
            requestAnimationFrame(draw);
        }

        function jump() { velocity = -7; }
        window.onkeydown = (e) => { if(e.code === "Space") jump(); };
        canvas.onclick = jump;
        draw();
    </script>
</body>
</html>
