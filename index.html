    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --green: #238636; --gray: #8b949e; 
            --neon: #00f2ff; /* Cor base do Neon */
        }

        /* Reset e Centralização Global */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            padding: 50px 20px;
            margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; /* Centraliza textos por padrão */
            min-height: 100vh;
        }

        .container {
            max-width: 800px; width: 100%;
            background: var(--card); padding: 30px;
            border-radius: 15px; border: 1px solid #30363d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        /* --- O LETREIRO NEON Pulsante e Centralizado --- */
        h1 {
            color: white;
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 2.2rem; margin-bottom: 5px;
            animation: neonPulse 1.5s ease-in-out infinite alternate;
        }

        /* Animação que muda a cor e o brilho */
        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--neon), 
                             0 0 40px var(--neon), 0 0 70px var(--neon);
            }
            to {
                text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px var(--accent), 
                             0 0 20px var(--accent), 0 0 35px var(--accent);
                color: var(--neon);
            }
        }

        h2 { color: var(--neon); font-size: 1.2rem; margin-top: 30px; }
        
        /* Centralizando parágrafos de texto */
        p { color: var(--gray); font-size: 1em; line-height: 1.6; max-width: 600px; margin: 0 auto 15px auto; }

        /* --- Grupo de Botões Centralizados --- */
        .btn-group {
            margin: 25px 0;
            display: flex; flex-wrap: wrap; justify-content: center; /* Alinha no centro */
            gap: 15px;
        }

        .btn {
            display: inline-block; padding: 12px 24px; color: white;
            text-decoration: none; border-radius: 6px; font-weight: bold;
            transition: 0.3s; cursor: pointer; border: none;
        }

        .btn-github { background-color: var(--green); }
        .btn-github:hover { background-color: #2ea043; }
        .btn-pix { background-color: #32bcad; color: #0d1117; }
        .btn-pix:hover { background-color: #45d6c6; }

        .ads-container {
            margin: 25px 0; padding: 15px; background: #21262d;
            border-radius: 8px; border: 1px dashed #484f58; min-height: 100px;
        }

        .section-box { margin-top: 40px; padding: 20px; border-top: 1px solid #30363d; }

        /* --- Rodapé de Sistema Centralizado --- */
        footer {
            margin-top: 60px; padding: 40px 20px;
            border-top: 1px solid #30363d; width: 100%;
            display: flex; flex-direction: column; align-items: center; /* Força centralização */
        }
        
        .system-log {
            margin-bottom: 20px; padding: 15px; background: #000;
            border: 1px solid var(--neon); display: inline-block;
            border-radius: 5px; font-family: monospace; font-size: 0.9rem;
            animation: borderPulse 2s infinite alternate;
        }

        @keyframes borderPulse {
            from { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
            to { border-color: var(--accent); box-shadow: 0 0 5px var(--accent); }
        }
    </style>
</head>
