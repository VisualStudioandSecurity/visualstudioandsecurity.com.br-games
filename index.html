<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Guilherme Silva</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 filter=%22drop-shadow(0 0 10px %2300f2ff)%22>🔒</text></svg>">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4389870681468404" crossorigin="anonymous"></script>

    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --neon: #00f2ff; --gray: #8b949e; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .container { width: 90%; max-width: 1000px; margin: 50px auto; }

        /* Letreiro Neon Centralizado */
        h1 { 
            font-size: 2.8rem; text-transform: uppercase; letter-spacing: 3px;
            animation: neonPulse 1.5s ease-in-out infinite alternate; 
            margin-bottom: 5px;
        }

        @keyframes neonPulse {
            from { text-shadow: 0 0 10px #fff, 0 0 20px var(--neon), 0 0 30px var(--neon); color: #fff; }
            to { text-shadow: 0 0 5px #fff, 0 0 15px var(--accent), 0 0 25px var(--accent); color: var(--neon); }
        }

        /* Galeria de Projetos */
        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; margin-top: 50px; 
        }

        .game-card { 
            background: var(--card); border: 1px solid #30363d; border-radius: 12px; 
            overflow: hidden; transition: 0.4s;
        }

        .game-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .game-card img { width: 100%; height: 200px; object-fit: cover; background: #000; }

        .btn-group { margin: 40px 0; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 28px; border-radius: 6px; font-weight: bold; text-decoration: none; color: white; border: none; cursor: pointer; transition: 0.3s; }
        .btn-github { background: #238636; }
        .btn-pix { background: #32bcad; color: #0d1117; }

        /* Rodapé Centralizado */
        footer { 
            width: 100%; padding: 60px 0; border-top: 1px solid #30363d; background: #090c10;
            display: flex; flex-direction: column; align-items: center;
        }

        .system-log { border: 1px solid var(--neon); padding: 10px 25px; font-family: monospace; border-radius: 5px; color: var(--neon); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Visual Studio Games</h1>
        <p style="color: var(--gray); margin-bottom: 30px;">Especialista em Python, GDevelop e Cyber Security</p>

        <div style="margin: 20px 0; min-height: 100px;">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4389870681468404" data-ad-slot="5775198406" data-ad-format="auto"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="gallery">
            <div class="game-card">
                <img src="thumb_neon_snaker.jpg" alt="Neon Snaker">
                <div style="padding: 15px;"><h3>Neon Snaker</h3></div>
            </div>
            <div class="game-card">
                <img src="thumb_cyber_defense.jpg" alt="Cyber Defense">
                <div style="padding: 15px;"><h3>Cyber Defense</h3></div>
            </div>
            <div class="game-card">
                <img src="thumb_breakout.jpg" alt="Breakout">
                <div style="padding: 15px;"><h3>Breakout Retro</h3></div>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://github.com/VisualStudioAndSecurity" class="btn btn-github" target="_blank">GitHub</a>
            <button onclick="copyPix()" class="btn btn-pix">Apoiar via PIX</button>
        </div>
    </div>

    <footer>
        <div class="system-log">[SYSTEM_LOG]: 8145 VISITAS_REAIS</div>
        <div style="color: var(--gray);">&copy; 2026 Guilherme Silva | Visual Studio Games</div>
    </footer>

    <script>
        function copyPix() {
            const pixKey = "10267545266";
            navigator.clipboard.writeText(pixKey).then(() => alert("PIX Copiado!"));
        }
    </script>
</body>
</html>
