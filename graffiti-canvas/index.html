<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Graffiti | OPEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050505; height: 100%; }
        canvas { display: block; background: #000; touch-action: none; }
        .tools { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(20,20,20,0.9); padding: 15px; border-radius: 12px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="tools">
        <input type="color" id="colorPicker" value="#00f2ff" class="w-10 h-10 cursor-pointer bg-transparent border-none">
        <button onclick="location.reload()" class="ml-4 text-white text-xs font-bold border border-white/20 px-3 py-2 rounded hover:bg-white/10">LIMPAR TUDO</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resize);
        resize();

        let drawing = false;

        const start = (e) => { drawing = true; draw(e); };
        const end = () => { drawing = false; ctx.beginPath(); };
        
        const draw = (e) => {
            if (!drawing) return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;

            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            // Efeito de spray simples
            ctx.shadowBlur = 10;
            ctx.shadowColor = colorPicker.value;
            
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mouseup', end);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
        canvas.addEventListener('touchend', end);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    </script>
</body>
</html>
