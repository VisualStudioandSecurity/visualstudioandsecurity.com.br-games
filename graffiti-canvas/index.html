<!doctype html>
<html lang="pt-br" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Graffiti | By Visual Studio Games</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background-color: #050505; }
    :root {
      --bg-color: #050505;
      --surface-color: #111111;
      --text-color: #f0f0f0;
      --primary-action: #00f3ff;
    }
    canvas { touch-action: none; cursor: none; }
    .ui-overlay { pointer-events: none; }
    .ui-overlay > * { pointer-events: auto; }
  </style>
</head>
<body class="text-white h-full flex flex-col">

  <div class="fixed top-4 left-4 z-50 flex gap-2 ui-overlay">
    <input type="color" id="color-picker" value="#00f3ff" class="w-12 h-12 rounded-lg border-2 border-white/20 bg-transparent cursor-pointer">
  </div>

  <canvas id="graffiti-canvas" class="w-full h-full"></canvas>

  <div id="spray-follower" class="fixed pointer-events-none z-50" style="width: 100px; height: 100px; margin-left: -50px; margin-top: -50px;">
    <svg viewBox="0 0 100 100" class="w-full h-full">
      <path class="can-top-follower" d="M35 25h30v10H35z" fill="#00f3ff" />
      <rect x="30" y="35" width="40" height="50" rx="5" fill="#333" />
      <rect class="can-label-follower" x="30" y="45" width="40" height="20" fill="#00f3ff" opacity="0.8" />
    </svg>
  </div>

  <script>
    // Inicialização Segura
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Iniciar Ícones
      if(window.lucide) lucide.createIcons();

      const canvas = document.getElementById('graffiti-canvas');
      const ctx = canvas.getContext('2d');
      const colorPicker = document.getElementById('color-picker');
      const follower = document.getElementById('spray-follower');

      // Ajustar Canvas
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      // Lógica do Spray (Resumo da sua lógica original)
      let isPainting = false;

      function updateSprayCanFollower(e) {
        const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        follower.style.transform = `translate(${x}px, ${y}px)`;
      }

      function updateSprayCanColor() {
        const color = colorPicker.value;
        document.querySelectorAll('.can-top-follower').forEach(el => el.setAttribute('fill', color));
        document.querySelectorAll('.can-label-follower').forEach(el => el.setAttribute('fill', color));
      }

      // Eventos
      document.addEventListener('mousemove', updateSprayCanFollower);
      colorPicker.addEventListener('change', updateSprayCanColor);
      
      // Proteção de Autoria (Senior Level)
      document.addEventListener('contextmenu', e => e.preventDefault());
      
      // Iniciar cor
      updateSprayCanColor();
    });
  </script>
</body>
</html>
