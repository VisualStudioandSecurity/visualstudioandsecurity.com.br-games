<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Neon Snaker - VS Games</title>
    <style>
        :root { --neon-green: #0f0; --bg: #000; }
        
        body { 
            background: var(--bg); color: var(--neon-green); text-align: center; 
            font-family: 'Courier New', monospace; margin: 0; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        h1 { font-size: 1.5rem; margin: 10px 0; text-shadow: 0 0 10px var(--neon-green); }
        
        canvas { 
            border: 3px solid var(--neon-green); 
            box-shadow: 0 0 20px var(--neon-green); 
            max-width: 90vw; max-height: 70vh; 
            background: #000; touch-action: none;
        }

        .instrucoes { font-size: 0.8rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>NEON SNAKER</h1>
    <canvas id="snake" width="400" height="400"></canvas>
    <p class="instrucoes">Deslize para mover no celular ou use as setas no PC</p>
