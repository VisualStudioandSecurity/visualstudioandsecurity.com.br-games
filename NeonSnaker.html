<html lang="pt-br" class="h-full">
 <head>
  <meta charset="UTF-8">
  <title>Neon Snaker | Visual Studio Games</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    html, body { 
      height: 100%; 
      margin: 0; 
      box-sizing: border-box;
    }
    body { 
      background: #050505; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      color: #00f3ff; 
      font-family: 'Courier New', monospace; 
      overflow: auto;
    }
    canvas { 
      border: 2px solid #00f3ff; 
      box-shadow: 0 0 20px #00f3ff; 
      background: #000; 
      margin: 20px 0;
    }
    .score { 
      font-size: 24px; 
      margin-bottom: 10px; 
      text-shadow: 0 0 10px #00f3ff; 
    }
    .info { 
      font-size: 14px; 
      margin-top: 10px; 
      color: #00f3ff88; 
    }
    .game-over-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.85); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      z-index: 10; 
    }
    .game-over-overlay h2 { 
      color: #ff0055; 
      font-size: 32px; 
      text-shadow: 0 0 20px #ff0055; 
      font-family: 'Courier New', monospace; 
      margin-bottom: 10px; 
    }
    .game-over-overlay p { 
      color: #00f3ff; 
      font-family: 'Courier New', monospace; 
      margin-bottom: 20px; 
    }
    .game-over-overlay button { 
      background: transparent; 
      border: 2px solid #00f3ff; 
      color: #00f3ff; 
      font-family: 'Courier New', monospace; 
      font-size: 18px; 
      padding: 10px 30px; 
      cursor: pointer; 
      text-shadow: 0 0 10px #00f3ff; 
      box-shadow: 0 0 15px #00f3ff44; 
      transition: 0.2s;
    }
    .game-over-overlay button:hover { 
      background: #00f3ff22; 
      box-shadow: 0 0 25px #00f3ff;
    }
  </style>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

 </head>
 <body>
  <div class="score" id="titleDisplay">
   DATA_COLLECTED: <span id="scoreVal">0</span>
  </div>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>
  <p class="info">Use as setas para coletar os pacotes de dados.</p>
  <div id="gameOverOverlay" class="game-over-overlay" style="display:none;">
   <h2>SYSTEM_CRASH</h2>
   <p>Pacotes coletados: <span id="finalScore">0</span></p><button id="restartBtn">[ REINICIAR ]</button>
  </div>
  <script>
    const defaultConfig = {
      title_text: "DATA_COLLECTED",
      primary_color: "#050505",
      surface_color: "#000000",
      text_color: "#00f3ff",
      accent_color: "#ff0055",
      secondary_color: "#005555",
      font_family: "Courier New"
    };

    let gameRunning = true;
    let snake = [{x: 200, y: 200}];
    let food = {x: (Math.random() * 40 | 0) * 10, y: (Math.random() * 40 | 0) * 10};
    let direction = {x: 10, y: 0};
    let nextDirection = {x: 10, y: 0};
    let score = 0;

    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');

    function applyConfig(config) {
      const title = config.title_text || defaultConfig.title_text;
      const scoreVal = document.getElementById('scoreVal').textContent;
      document.getElementById('titleDisplay').innerHTML = title + ': <span id="scoreVal">' + scoreVal + '</span>';
      
      const font = (config.font_family || defaultConfig.font_family) + ", monospace";
      document.querySelectorAll('.score, .info, .game-over-overlay h2, .game-over-overlay p, .game-over-overlay button')
        .forEach(el => el.style.fontFamily = font);
      
      const tc = config.text_color || defaultConfig.text_color;
      const ac = config.accent_color || defaultConfig.accent_color;
      
      document.body.style.color = tc;
      document.body.style.background = config.primary_color || defaultConfig.primary_color;
      
      canvas.style.borderColor = tc;
      canvas.style.boxShadow = '0 0 20px ' + tc;
      
      document.querySelector('.game-over-overlay h2').style.color = ac;
      document.querySelector('.game-over-overlay h2').style.textShadow = '0 0 20px ' + ac;
    }

    function drawGame() {
      const surfaceColor = window.elementSdk?.config?.surface_color || defaultConfig.surface_color;
      const textColor = window.elementSdk?.config?.text_color || defaultConfig.text_color;
      const accentColor = window.elementSdk?.config?.accent_color || defaultConfig.accent_color;

      ctx.fillStyle = surfaceColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = textColor;
      snake.forEach(segment => {
        ctx.fillRect(segment.x, segment.y, 10, 10);
      });

      ctx.fillStyle = accentColor;
      ctx.fillRect(food.x, food.y, 10, 10);
    }

    function update() {
      if (!gameRunning) return;

      direction = nextDirection;
      const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || 
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameRunning = false;
        document.getElementById('gameOverOverlay').style.display = 'flex';
        document.getElementById('finalScore').textContent = score;
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('scoreVal').textContent = score;
        food = {x: (Math.random() * 40 | 0) * 10, y: (Math.random() * 40 | 0) * 10};
      } else {
        snake.pop();
      }
    }

    function gameLoop() {
      update();
      drawGame();
      setTimeout(gameLoop, 100);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' && direction.y === 0) nextDirection = {x: 0, y: -10};
      if (e.key === 'ArrowDown' && direction.y === 0) nextDirection = {x: 0, y: 10};
      if (e.key === 'ArrowLeft' && direction.x === 0) nextDirection = {x: -10, y: 0};
      if (e.key === 'ArrowRight' && direction.x === 0) nextDirection = {x: 10, y: 0};
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      gameRunning = true;
      snake = [{x: 200, y: 200}];
      food = {x: (Math.random() * 40 | 0) * 10, y: (Math.random() * 40 | 0) * 10};
      direction = {x: 10, y: 0};
      nextDirection = {x: 10, y: 0};
      score = 0;
      document.getElementById('scoreVal').textContent = '0';
      document.getElementById('gameOverOverlay').style.display = 'none';
    });

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
            { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["title_text", config.title_text || defaultConfig.title_text]
        ])
      });
    }

    gameLoop();
  </script>
